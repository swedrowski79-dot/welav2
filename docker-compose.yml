services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: ["php", "-S", "0.0.0.0:8080", "-t", "public"]
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    environment:
      AFS_DB_HOST: ${AFS_DB_HOST:-host.docker.internal}
      AFS_DB_PORT: ${AFS_DB_PORT:-1435}
      AFS_DB_NAME: ${AFS_DB_NAME:-AFS_2018}
      AFS_DB_USER: ${AFS_DB_USER:-sa}
      AFS_DB_PASS: ${AFS_DB_PASS:-}
      XT_API_URL: ${XT_API_URL:-http://10.0.1.104/wela-api}
      XT_API_KEY: ${XT_API_KEY:-}
      STAGE_DB_HOST: ${STAGE_DB_HOST:-mysql}
      STAGE_DB_PORT: ${STAGE_DB_PORT:-3306}
      STAGE_DB_NAME: ${STAGE_DB_NAME:-stage_sync}
      STAGE_DB_USER: ${STAGE_DB_USER:-stage}
      STAGE_DB_PASS: ${STAGE_DB_PASS:-stage}
      EXTRA_DB_HOST: ${EXTRA_DB_HOST:-mysql}
      EXTRA_DB_PORT: ${EXTRA_DB_PORT:-3306}
      EXTRA_DB_NAME: ${EXTRA_DB_NAME:-afs_extras}
      EXTRA_DB_USER: ${EXTRA_DB_USER:-stage}
      EXTRA_DB_PASS: ${EXTRA_DB_PASS:-stage}
      EXTRA_SQLITE_PATH: ${EXTRA_SQLITE_PATH:-/app/data/extra.sqlite}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    entrypoint: ["/bin/bash", "/opt/welav2/mysql/entrypoint.sh"]
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--skip-log-bin"]
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: stage_sync
      MYSQL_USER: stage
      MYSQL_PASSWORD: stage
      MYSQL_ROOT_PASSWORD: root
      MYSQL_RAMDISK_ENABLED: ${MYSQL_RAMDISK_ENABLED:-1}
    volumes:
      - mysql_data:/var/lib/mysql-persistent
      - ./docker/mysql:/opt/welav2/mysql:ro
      - ./database.sql:/docker-entrypoint-initdb.d/20-stage-schema.sql:ro
    tmpfs:
      - /mnt/mysql-ram:size=${MYSQL_RAMDISK_SIZE_BYTES:-8589934592}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
